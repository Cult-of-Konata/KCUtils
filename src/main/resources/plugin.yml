name: KCUtils
description: $description
prefix: [ KCUtil ]
version: '$version'

main: site.meowcat.KCUtils.KCUtils
api-version: '1.21'
load: POSTWORLD

authors: [ meowcat767, weirdplop ]
website: https://discord.gg/konata

commands:
  ban-ip:
    description: Ban a player or IP
    usage: /ban-ip <IP or player> [reason]
    permission: KCUtils.banip
    aliases: [banip]
  about:
    description: Shows information about the plugin
    usage: /about
    permission: KCUtils.about
